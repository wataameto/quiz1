<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px;
    }
    .container {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      max-width: 900px;
      width: 100%;
      padding: 20px;
      position: relative;
    }
    h1 { font-size: 1.4rem; color: #2d3748; margin-bottom: 4px; }
    .subtitle { color: #718096; font-size: 0.85rem; margin-bottom: 18px; }
    .hidden { display: none; }
    #auth-status { margin-bottom: 16px; }
    .btn-login-inline { background: transparent; color: #667eea; border: 2px solid #667eea; border-radius: 10px; padding: 8px 16px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-logout-inline { background: transparent; border: 1px solid #fca5a5; color: #e53e3e; font-size: 0.75rem; font-weight: 700; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit; margin-left: 8px; }
    .user-chip { display: inline-flex; align-items: center; gap: 8px; }
    .denied { text-align: center; padding: 40px 20px; color: #c53030; font-weight: 700; }
    .loading { text-align: center; padding: 40px 20px; color: #a0aec0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #edf2f7; }
    th { color: #718096; font-weight: 700; white-space: nowrap; }
    td.num { text-align: right; }
    th.num { text-align: right; }
    .summary { display: flex; gap: 20px; margin-bottom: 18px; flex-wrap: wrap; }
    .summary-item { background: #f7fafc; border-radius: 12px; padding: 12px 18px; }
    .summary-item .label { font-size: 0.75rem; color: #a0aec0; }
    .summary-item .value { font-size: 1.4rem; font-weight: 800; color: #2d3748; }
    .error-cell { color: #e53e3e; font-size: 0.8rem; }
    .refresh-btn { background: #edf2f7; border: none; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; color: #4a5568; font-family: inherit; margin-bottom: 12px; }
    .section-heading { font-size: 1rem; color: #2d3748; margin: 20px 0 8px; }
    .user-name-cell { font-weight: 700; color: #2d3748; }
    .user-email-cell { font-size: 0.75rem; color: #a0aec0; }
    #user-rows tr { cursor: pointer; }
    #user-rows tr:hover { background: #f7fafc; }
    .detail-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 10000; padding: 12px; }
    .detail-overlay.open { display: flex; }
    .detail-modal { background: #fff; border-radius: 16px; padding: 20px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .detail-modal h2 { font-size: 1.15rem; color: #2d3748; margin-bottom: 2px; }
    .detail-modal .detail-sub { font-size: 0.78rem; color: #a0aec0; margin-bottom: 14px; }
    .detail-close-btn { float: right; background: #edf2f7; border: none; border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; color: #4a5568; font-family: inherit; }
    .detail-quiz-block { border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    .detail-quiz-title { font-weight: 800; color: #2d3748; font-size: 0.95rem; }
    .detail-quiz-lap { font-size: 0.78rem; color: #d69e2e; font-weight: 700; margin-bottom: 8px; }
    .detail-part-label { font-size: 0.82rem; font-weight: 700; color: #4a5568; margin: 8px 0 4px; }
    .detail-lesson-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #4a5568; padding: 3px 0; border-bottom: 1px solid #f7fafc; }
    .detail-lesson-row .score-good { color: #38a169; font-weight: 700; }
    .detail-empty { color: #a0aec0; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" style="font-size:0.8rem; color:#718096; text-decoration:none;">🏠 メインメニューへ戻る</a>
    <h1 style="margin-top:10px;">📊 管理者ダッシュボード</h1>
    <p class="subtitle">全ユーザーの利用状況（管理者アカウントのみ閲覧可）</p>
    <div id="auth-status"></div>

    <div id="screen-login" class="hidden">
      <p style="color:#718096;">この画面を見るにはログインが必要です。</p>
    </div>

    <div id="screen-denied" class="denied hidden">
      🚫 このアカウントには管理者権限がありません
    </div>

    <div id="screen-loading" class="loading hidden">読み込み中…</div>

    <div id="screen-dashboard" class="hidden">
      <button class="refresh-btn" onclick="loadDashboard()">🔄 再読み込み</button>
      <div class="summary">
        <div class="summary-item">
          <div class="label">利用実績のあるユーザー数</div>
          <div class="value" id="summary-total-users">-</div>
        </div>
        <div class="summary-item">
          <div class="label">全教材の総挑戦回数</div>
          <div class="value" id="summary-total-attempts">-</div>
        </div>
      </div>

      <h2 class="section-heading">👤 ユーザーごとの利用状況</h2>
      <table>
        <thead>
          <tr>
            <th>ユーザー</th>
            <th class="num">触った教材数</th>
            <th class="num">総挑戦回数</th>
            <th class="num">周回合計</th>
            <th>最終ログイン</th>
          </tr>
        </thead>
        <tbody id="user-rows"></tbody>
      </table>

      <h2 class="section-heading">📚 教材ごとの利用状況</h2>
      <table>
        <thead>
          <tr>
            <th>教材</th>
            <th class="num">利用ユーザー数</th>
            <th class="num">総挑戦回数</th>
            <th class="num">周回合計</th>
          </tr>
        </thead>
        <tbody id="dashboard-rows"></tbody>
      </table>
    </div>
  </div>

  <!-- ログアウト確認ダイアログ（quiz-app.jsのlogout()が参照する） -->
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000;">
    <div style="background:#fff; border-radius:16px; padding:18px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-width:440px; width:90%; text-align:center;">
      <h2 style="font-size:1.2rem; color:#2d3748; margin-bottom:16px; font-weight:800;">ログアウトしますか？</h2>
      <div style="display:flex; gap:12px; justify-content:center;">
        <button onclick="closeLogoutModal()" style="flex:1; padding:12px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#2d3748; font-family:inherit; white-space:nowrap;">キャンセル</button>
        <button onclick="confirmLogout()" style="flex:1; padding:12px; background:#e53e3e; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#fff; font-family:inherit; white-space:nowrap;">ログアウト</button>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this) closeUserDetail()">
    <div class="detail-modal">
      <button class="detail-close-btn" onclick="closeUserDetail()">閉じる</button>
      <h2 id="detail-name">-</h2>
      <p class="detail-sub" id="detail-email">-</p>
      <div id="detail-body"><p class="detail-empty">読み込み中…</p></div>
    </div>
  </div>

  <script src="../shared/quiz-app.js?v=20260720155716"></script>
  <script>
    const ADMIN_EMAIL = 'wataamegit@gmail.com';

    function showScreen(id) {
      ['screen-login', 'screen-denied', 'screen-loading', 'screen-dashboard'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    auth.onAuthStateChanged(user => {
      renderAuthStatus();
      if (!user) {
        showScreen('screen-login');
      } else if (user.email !== ADMIN_EMAIL) {
        showScreen('screen-denied');
      } else {
        loadDashboard();
      }
    });

    function formatLastSeen(ts) {
      if (!ts || typeof ts.toDate !== 'function') return '-';
      return ts.toDate().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
    }

    // ユーザー詳細モーダルで使い回すため、直近のloadDashboard()結果を保持しておく
    let configCache = null;
    let profileCache = {};
    let rawUserDocs = {}; // uid -> { quizId: docData }
    let questionsCache = {}; // `${quizId}_${level}` -> questions{level}.json
    let quizMetaCacheAll = null;

    async function loadDashboard() {
      showScreen('screen-loading');
      const config = await fetch('../config.json').then(r => r.json());
      configCache = config;
      const quizIds = Object.keys(config);
      rawUserDocs = {};

      // quiz_menu_prefsにログイン時同期しているdisplayName/email/lastSeenを
      // uidから引けるようにしておく（無ければuidをそのまま表示する）
      const profileMap = {};
      try {
        const prefsSnap = await db.collection('quiz_menu_prefs').get();
        prefsSnap.forEach(doc => { profileMap[doc.id] = doc.data(); });
      } catch (e) { console.error('Failed to load quiz_menu_prefs:', e); }
      profileCache = profileMap;

      const userStats = {}; // uid -> { quizCount, totalAttempts, totalLaps }
      const quizRows = [];
      let totalAttemptsAll = 0;

      for (const id of quizIds) {
        try {
          const snap = await db.collection(`quiz_${id}`).get();
          let quizTotalAttempts = 0;
          let quizTotalLaps = 0;
          snap.forEach(doc => {
            const data = doc.data();
            if (!rawUserDocs[doc.id]) rawUserDocs[doc.id] = {};
            rawUserDocs[doc.id][id] = data;
            let userAttempts = 0;
            Object.keys(data).forEach(k => {
              if (k.startsWith('lessonAttemptCount_') || k.startsWith('lessonPracticeCount_')) {
                const v = data[k];
                if (typeof v === 'number') userAttempts += v;
              }
            });
            const userLap = typeof data.lap === 'number' ? data.lap : 0;
            quizTotalAttempts += userAttempts;
            quizTotalLaps += userLap;

            if (!userStats[doc.id]) userStats[doc.id] = { quizCount: 0, totalAttempts: 0, totalLaps: 0 };
            if (userAttempts > 0 || userLap > 0) userStats[doc.id].quizCount += 1;
            userStats[doc.id].totalAttempts += userAttempts;
            userStats[doc.id].totalLaps += userLap;
          });
          totalAttemptsAll += quizTotalAttempts;
          quizRows.push({ id, title: (config[id] && config[id].title) || id, userCount: snap.size, totalAttempts: quizTotalAttempts, totalLaps: quizTotalLaps });
        } catch (e) {
          console.error(`Failed to load quiz_${id}:`, e);
          quizRows.push({ id, title: (config[id] && config[id].title) || id, error: true });
        }
      }

      const userIds = Object.keys(userStats);
      document.getElementById('summary-total-users').textContent = userIds.length;
      document.getElementById('summary-total-attempts').textContent = totalAttemptsAll;

      const sortedUserIds = userIds.sort((a, b) => userStats[b].totalAttempts - userStats[a].totalAttempts);
      const userTbody = document.getElementById('user-rows');
      userTbody.innerHTML = sortedUserIds.map(uid => {
        const stats = userStats[uid];
        const profile = profileMap[uid] || {};
        const name = profile.displayName ? escapeHtml(profile.displayName) : uid;
        const email = profile.email ? `<div class="user-email-cell">${escapeHtml(profile.email)}</div>` : '';
        return `<tr onclick="openUserDetail('${uid}')">
          <td><div class="user-name-cell">${name}</div>${email}</td>
          <td class="num">${stats.quizCount}</td>
          <td class="num">${stats.totalAttempts}</td>
          <td class="num">${stats.totalLaps}</td>
          <td>${formatLastSeen(profile.lastSeen)}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="5" class="error-cell">利用実績のあるユーザーがいません</td></tr>';

      const quizTbody = document.getElementById('dashboard-rows');
      quizTbody.innerHTML = quizRows.map(r => {
        if (r.error) {
          return `<tr><td>${escapeHtml(r.title)}</td><td colspan="3" class="error-cell">読み込み失敗</td></tr>`;
        }
        return `<tr>
          <td>${escapeHtml(r.title)}</td>
          <td class="num">${r.userCount}</td>
          <td class="num">${r.totalAttempts}</td>
          <td class="num">${r.totalLaps}</td>
        </tr>`;
      }).join('');

      showScreen('screen-dashboard');
    }

    function closeUserDetail() {
      document.getElementById('detail-overlay').classList.remove('open');
    }

    async function openUserDetail(uid) {
      const overlay = document.getElementById('detail-overlay');
      overlay.classList.add('open');
      document.getElementById('detail-body').innerHTML = '<p class="detail-empty">読み込み中…</p>';

      const profile = profileCache[uid] || {};
      document.getElementById('detail-name').textContent = profile.displayName || uid;
      document.getElementById('detail-email').textContent = profile.email || '';

      if (!quizMetaCacheAll) {
        quizMetaCacheAll = await fetch('../quiz-meta.json').then(r => r.json()).catch(() => ({}));
      }

      const userQuizIds = Object.keys(rawUserDocs[uid] || {});
      if (userQuizIds.length === 0) {
        document.getElementById('detail-body').innerHTML = '<p class="detail-empty">この教材の利用履歴はありません</p>';
        return;
      }

      const blocks = [];
      for (const quizId of userQuizIds) {
        const data = rawUserDocs[uid][quizId];
        const meta = quizMetaCacheAll[quizId];
        const title = (configCache[quizId] && configCache[quizId].title) || quizId;
        const lap = typeof data.lap === 'number' ? data.lap : 0;
        const parts = (meta && meta.parts) || 0;

        let partsHtml = '';
        for (let level = 1; level <= parts; level++) {
          const cacheKey = `${quizId}_${level}`;
          if (!(cacheKey in questionsCache)) {
            questionsCache[cacheKey] = await fetch(`../${quizId}/questions${level}.json`).then(r => r.ok ? r.json() : null).catch(() => null);
          }
          const qData = questionsCache[cacheKey];
          if (!qData || !Array.isArray(qData.tests)) continue;
          const levelLabel = qData.label || `Part${level}`;

          let lessonsHtml = '';
          qData.tests.forEach(t => {
            const score = data[`lesson_${level}_${t.id}`];
            const attempts = data[`lessonAttemptCount_${level}_${t.id}`] || 0;
            const practice = data[`lessonPracticeCount_${level}_${t.id}`] || 0;
            if (score === undefined && attempts === 0 && practice === 0) return;
            const scoreLabel = score === undefined ? '未挑戦' : `${score}点`;
            const scoreClass = typeof score === 'number' && score >= 80 ? 'score-good' : '';
            lessonsHtml += `<div class="detail-lesson-row"><span>${escapeHtml(t.title || `レッスン${t.id}`)}</span><span class="${scoreClass}">${scoreLabel}（試験${attempts}回・演習${practice}回）</span></div>`;
          });
          if (lessonsHtml) {
            partsHtml += `<div class="detail-part-label">${escapeHtml(levelLabel)}</div>${lessonsHtml}`;
          }
        }

        if (!partsHtml) continue; // このuidのデータが全部未挑戦相当（0件）なら教材ごと省略
        blocks.push(`<div class="detail-quiz-block">
          <div class="detail-quiz-title">${escapeHtml(title)}</div>
          <div class="detail-quiz-lap">🌟 周回数: ${lap}</div>
          ${partsHtml}
        </div>`);
      }

      document.getElementById('detail-body').innerHTML = blocks.join('') || '<p class="detail-empty">この教材の利用履歴はありません</p>';
    }
  </script>
</body>
</html>
