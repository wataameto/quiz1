<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠満点まで帰れません✨</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="../shared/quiz-app.css">
  <style id="dynamic-colors"></style>
</head>
<body>
<div class="container">
  <div id="screen-home">
    <div class="home-top">
      <div class="auth-status" id="auth-status"></div>
      <a href="../" onclick="backToMainMenu(event)" style="position:absolute; top:42px; left:0; background:transparent; color:#f7971e; border:2px solid #f7971e; border-radius:10px; padding:6px 12px; font-size:0.78rem; font-weight:700; cursor:pointer; text-decoration:none; white-space:nowrap; transition:all 0.2s;" onmouseover="this.style.background='#fffbea'" onmouseout="this.style.background='transparent'">🏠 メインメニュー</a>
      <button class="btn-reset-corner" onclick="resetScores()">🗑️ 成績リセット</button>
      <div class="total-score-bar" style="position: absolute; top: 42px; right: 0; text-align: right; margin-bottom: 0; margin-top: 0;">🎯 総合成績: <span id="total-score-display">-</span></div>
      <div style="height: 80px;"></div>
      <div class="home-header">
        <p class="screen-label">クイズトップ</p>
        <h1 id="quiz-heading">クイズ</h1>
        <p id="quiz-description"></p>
      </div>
    </div>
    <div class="part-scores-section" id="part-scores-section" style="display:none;">
      <div id="part-scores-list"></div>
    </div>
    <div class="current-part-card" id="current-part-card" style="display:none;"></div>
    <div class="part-set-list" id="test-grid"></div>
  </div>

  <div id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <button class="quiz-back" onclick="showHome()">テスト選択へ戻る</button>
      <div class="quiz-title-wrap">
        <h2 id="quiz-title"></h2>
        <p id="quiz-subtitle"></p>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span id="progress-label"></span>
        <span id="progress-pct"></span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    </div>
    <div class="scenario" id="scenario"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn"></button>
  </div>

  <div id="screen-results" class="hidden">
    <div class="result-header"><h1 id="result-title"></h1></div>
    <div class="score-area">
      <div class="score-ring">
        <span class="score-num" id="score-num"></span>
      </div>
      <div class="score-stars" id="score-stars"></div>
      <p class="score-msg" id="score-msg"></p>
      <p class="best-msg" id="best-msg"></p>
    </div>
    <div class="result-list">
      <h3>📋 解答一覧</h3>
      <div id="answer-list"></div>
    </div>
    <button id="review-btn" class="btn-review" onclick="startReview()" style="display:none"></button>
    <button class="btn-home" onclick="showHome()">🏠 テスト選択に戻る</button>
  </div>

  <div id="screen-admin" class="hidden">
    <div class="admin-top">
      <a href="../" onclick="backToMainMenu(event)" style="position:absolute; top:0; left:0; background:transparent; color:#667eea; border:2px solid #667eea; border-radius:10px; padding:6px 12px; font-size:0.78rem; font-weight:700; cursor:pointer; text-decoration:none; white-space:nowrap; transition:all 0.2s;">🏠 メインメニュー</a>
      <div style="height:42px;"></div>
      <div class="admin-title" id="admin-title">問題一覧</div>
      <div class="admin-subtitle" id="admin-subtitle"></div>
    </div>
    <div id="admin-list"></div>
  </div>

  <!-- リセット確認ダイアログ -->
  <div id="reset-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000;">
    <div style="background:#fff; border-radius:16px; padding:18px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-width:400px; text-align:center;">
      <h2 style="font-size:1.2rem; color:#2d3748; margin-bottom:16px; font-weight:800;">スコアをリセット</h2>
      <p style="color:#718096; margin-bottom:24px; font-size:0.95rem;">どのスコアをリセットしますか？</p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <button onclick="closeResetModal()" style="flex:1; padding:12px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#2d3748; font-family:inherit;">キャンセル</button>
        <button onclick="resetCurrentLevel()" style="flex:1; padding:12px; background:#f7971e; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#fff; font-family:inherit;">現在のパートのみ</button>
        <button onclick="resetAllLevels()" style="flex:1; padding:12px; background:#e53e3e; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#fff; font-family:inherit;">全パート削除</button>
      </div>
    </div>
  </div>

  <!-- ログアウト確認ダイアログ -->
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:10000;">
    <div style="background:#fff; border-radius:16px; padding:18px; box-shadow:0 20px 60px rgba(0,0,0,0.3); max-width:360px; text-align:center;">
      <h2 style="font-size:1.2rem; color:#2d3748; margin-bottom:16px; font-weight:800;">ログアウトしますか？</h2>
      <div style="display:flex; gap:12px; justify-content:center;">
        <button onclick="closeLogoutModal()" style="flex:1; padding:12px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#2d3748; font-family:inherit;">キャンセル</button>
        <button onclick="confirmLogout()" style="flex:1; padding:12px; background:#e53e3e; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#fff; font-family:inherit;">ログアウト</button>
      </div>
    </div>
  </div>
</div>
<div class="confetti-wrap" id="confetti-wrap"></div>
<script src="../shared/quiz-app.js"></script>
</body>
</html>
