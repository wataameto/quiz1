<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズアプリ メニュー</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🏠</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      max-width: 600px;
      width: 100%;
      padding: 48px 36px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #667eea, #f093fb, #f5576c, #fda085);
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header .logo {
      font-size: 3.5rem;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 2rem;
      color: #2d3748;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .header p {
      color: #718096;
      font-size: 0.95rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .menu-card {
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      border: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .menu-card:nth-child(1) {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .menu-card:nth-child(2) {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #2d3748;
    }

    .menu-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .menu-card .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .menu-card h2 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .menu-card p {
      font-size: 0.85rem;
      opacity: 0.95;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .menu-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .menu-card {
        min-height: 160px;
        padding: 24px 16px;
      }

      .menu-card .icon {
        font-size: 2.5rem;
      }

      .menu-card h2 {
        font-size: 1.1rem;
      }
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #edf2f7;
      color: #718096;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">📚</div>
    <h1>クイズアプリ</h1>
    <p>学習問題に挑戦しよう！</p>
  </div>

  <div class="menu-grid">
    <a href="./boki1/" class="menu-card">
      <div class="icon">📖</div>
      <h2>簿記</h2>
      <p>江東区最強せいちゃんへの挑戦問題<br>パート1・パート2</p>
    </a>

    <a href="./devops/" class="menu-card">
      <div class="icon">☁️</div>
      <h2>DevOps</h2>
      <p>DOP-C02 練習問題<br>AWS Engineer Professional</p>
    </a>
  </div>

  <div class="footer">
    <p>© 2026 クイズアプリ</p>
  </div>
</div>
</body>
</html>
